services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://app:password@db:5432/referral_code_role
      SESSION_SECRET: ${SESSION_SECRET}
      BASE_URL: ${BASE_URL}
      LISTEN_ADDR: "0.0.0.0:8080"
      AUTH_GATEWAY_URL: ${AUTH_GATEWAY_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MAX_REDEEM_ATTEMPTS_PER_HOUR: ${MAX_REDEEM_ATTEMPTS_PER_HOUR:-20}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgres:16-alpine
    command: >
      postgres -c shared_buffers=64MB -c work_mem=2MB -c
      maintenance_work_mem=32MB -c effective_cache_size=128MB -c
      max_connections=15 -c wal_buffers=4MB -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: referral_code_role
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: "64m"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d referral_code_role" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
